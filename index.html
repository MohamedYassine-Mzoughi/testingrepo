<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard Login | Secure Access</title>
    <!-- Supabase JS Client from CDN (official) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        /* CSS Variables matching requirements */
        :root {
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-light: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --error-color: #ef4444;
            --success-outline: #10b981;
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --ring-focus: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* Main login card container */
        .login-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .login-card {
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-card);
            padding: 2rem 1.75rem 2.25rem 1.75rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Logo placeholder area */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.75rem;
        }

        .logo-placeholder {
            width: 300px;
            height: 100px;
            background: #f3f4f6;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 12px;
        }

        /* fallback if logo.png missing — still shows nice placeholder */
        .logo-placeholder img[alt="Dashboard Logo"] {
            background: #ffffff;
        }

        /* Headings & text */
        .card-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 1rem;
        }

        /* Form group styling */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1.5px solid var(--border-light);
            border-radius: 0.75rem;
            background-color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
            color: var(--text-primary);
        }

        .input-field:focus {
            border-color: var(--accent-color);
            box-shadow: var(--ring-focus);
        }

        /* Error message styling */
        .error-message {
            font-size: 0.75rem;
            color: var(--error-color);
            margin-top: 0.375rem;
            min-height: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.05s linear;
            margin-top: 0.5rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            background-color: var(--accent-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Info text below form */
        .info-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 1.75rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-light);
        }

        .info-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        /* subtle status alert styling (inline) */
        .status-alert {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: #fef2f2;
            color: #b91c1c;
            border-left: 4px solid var(--error-color);
        }

        .status-alert.success {
            background: #ecfdf5;
            color: #065f46;
            border-left-color: var(--success-outline);
            display: flex;
        }

        .status-alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border-left-color: var(--error-color);
            display: flex;
        }

        /* responsive adjustments */
        @media (max-width: 520px) {
            body {
                padding: 1rem;
            }
            .login-card {
                padding: 1.5rem;
            }
            .card-title {
                font-size: 1.5rem;
            }
        }

        /* loading state for button */
        .login-btn.loading {
            background-color: #9ca3af;
            pointer-events: none;
            opacity: 0.7;
        }

        /* simple spinner */
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Logo placeholder exactly as required: img src="logo.png" alt="Dashboard Logo" -->
        <div class="logo-wrapper">
            <div class="logo-placeholder">
                <img src="misc/Primary_Logo.png" alt="Dashboard Logo">
            </div>
        </div>

        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to your dashboard</p>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="admin@company.com" autocomplete="email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" id="loginButton" class="login-btn">
                <span id="btnText">Sign in</span>
            </button>

            <!-- Dynamic alert for supabase auth feedback -->
            <div id="authAlert" class="status-alert"></div>
        </form>

        <div class="info-text">
            Forgot your password? Contact your administrator.
        </div>
    </div>
</div>

<script>
    // ========================
    // SUPABASE CONFIGURATION (Placeholders - replace with actual keys)
    // ========================
    // IMPORTANT: For production, set these via environment or replace with real values.
    // GitHub Pages compatibility: users must replace these with their own Supabase URL and anon key.
    const SUPABASE_URL = "https://xjkcjcazvxkjjezjfngg.supabase.co";          // placeholder: e.g., "https://xyzcompany.supabase.co"
    const SUPABASE_ANON_KEY = "sb_publishable_uHh_-XiWjxIuOJJd9hkskA_zJYZAdYG"; // placeholder: e.g., "eyJhbGciOiJIUzI1NiIs..."

    // Global Supabase client variable
    let supabaseClient = null;

    // Helper: initialize supabase only if both values are provided and not placeholders
    function initSupabase() {
        // Check if the values have been replaced with real-looking ones (basic validation)
        const isUrlValid = SUPABASE_URL && SUPABASE_URL !== "SUPABASE_URL" && SUPABASE_URL.startsWith("https://");
        const isKeyValid = SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== "SUPABASE_ANON_KEY" && SUPABASE_ANON_KEY.length > 20;
        
        if (isUrlValid && isKeyValid && typeof supabase === 'object') {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase client initialized");
                return true;
            } catch (err) {
                console.warn("Supabase init error:", err);
                return false;
            }
        } else {
            console.warn("Supabase credentials missing or still placeholder. Authentication will be simulated in demo? No — we will show explicit error on login.");
            return false;
        }
    }

    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const btnTextSpan = document.getElementById('btnText');
    const authAlertDiv = document.getElementById('authAlert');
    const loginForm = document.getElementById('loginForm');
    const emailErrorSpan = document.getElementById('emailError');
    const passwordErrorSpan = document.getElementById('passwordError');

    // Helper: clear alert and set new message with type
    function showAlert(message, type = 'error') {
        authAlertDiv.innerHTML = ''; 
        authAlertDiv.className = `status-alert ${type}`;
        // optional icon (simple text)
        const icon = type === 'success' ? '✓ ' : '⚠️ ';
        authAlertDiv.innerHTML = `${icon}${message}`;
        authAlertDiv.style.display = 'flex';
        // Auto-scroll into view if needed
        authAlertDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideAlert() {
        authAlertDiv.style.display = 'none';
        authAlertDiv.className = 'status-alert';
        authAlertDiv.innerHTML = '';
    }

    // Client-side validation (email format, non-empty password)
    function validateForm(email, password) {
        let isValid = true;
        // reset errors
        emailErrorSpan.innerText = '';
        passwordErrorSpan.innerText = '';

        // Email validation: not empty + basic email pattern
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!email) {
            emailErrorSpan.innerText = 'Email address is required';
            isValid = false;
        } else if (!emailRegex.test(email)) {
            emailErrorSpan.innerText = 'Please enter a valid email address (e.g., name@example.com)';
            isValid = false;
        }

        // Password validation
        if (!password) {
            passwordErrorSpan.innerText = 'Password is required';
            isValid = false;
        } else if (password.length < 6) {
            passwordErrorSpan.innerText = 'Password must be at least 6 characters';
            isValid = false;
        }

        return isValid;
    }

    // Set loading state for button
    function setLoading(isLoading) {
        if (isLoading) {
            loginButton.classList.add('loading');
            btnTextSpan.innerHTML = '<span class="spinner"></span> Signing in...';
            loginButton.disabled = true;
        } else {
            loginButton.classList.remove('loading');
            btnTextSpan.innerText = 'Sign in';
            loginButton.disabled = false;
        }
    }

    // Perform login using Supabase
    async function performSupabaseLogin(email, password) {
        // Ensure supabase client is ready, otherwise error
        if (!supabaseClient) {
            const isReInit = initSupabase();
            if (!supabaseClient || !isReInit) {
                throw new Error('Supabase client not configured. Please set valid SUPABASE_URL and SUPABASE_ANON_KEY.');
            }
        }

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            // Map Supabase error to user-friendly message
            let friendlyMessage = error.message;
            if (error.message.toLowerCase().includes('invalid login credentials')) {
                friendlyMessage = 'Invalid email or password. Please try again.';
            } else if (error.message.toLowerCase().includes('email not confirmed')) {
                friendlyMessage = 'Please verify your email address before logging in.';
            }
            throw new Error(friendlyMessage);
        }

        // On success, data.user & data.session available
        return data;
    }

    // Main form submit handler
    async function handleLogin(event) {
        event.preventDefault();
        hideAlert();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // client-side validation before any API call
        if (!validateForm(email, password)) {
            // scroll to first error
            const firstError = document.querySelector('.error-message:not(:empty)');
            if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        setLoading(true);
        
        try {
            // Attempt Supabase authentication
            const result = await performSupabaseLogin(email, password);
            // Success: show success alert & optional redirect (but we keep consistent with requirement: show alert)
            if (result && result.user) {
                showAlert(`Welcome back, ${result.user.email || 'User'}! Login successful. Redirecting to dashboard...`, 'success');
                // Simulate redirect after 1.5 seconds (for dashboard experience)
                // In real scenario, you could redirect to dashboard.html or similar.
                setTimeout(() => {
                    // For demo purposes, we keep page but you could window.location.href = '/dashboard';
                    // Since GitHub Pages demo may not have dashboard, but we keep alert and reset? no, we show success.
                    // For professional UX, we notify and maybe disable further attempts.
                    loginButton.disabled = true; // prevent duplicate after success
                    // Optional: you can redirect to any route
                    window.location.href = "dashboard.html";
                    console.log("Authenticated user:", result.user);
                }, 1500);
            } else {
                throw new Error('Login response missing user data.');
            }
        } catch (error) {
            console.error('Supabase login error:', error);
            let errMsg = error.message || 'Authentication failed. Please check your credentials.';
            // Additional edge: if supabase missing keys, show custom message.
            if (!supabaseClient && (SUPABASE_URL === "SUPABASE_URL" || SUPABASE_ANON_KEY === "SUPABASE_ANON_KEY")) {
                errMsg = 'Supabase credentials are not configured. Please replace SUPABASE_URL and SUPABASE_ANON_KEY placeholders in the script section.';
            } else if (!supabaseClient && SUPABASE_URL && SUPABASE_ANON_KEY) {
                errMsg = 'Failed to initialize Supabase client. Check console for details.';
            }
            showAlert(errMsg, 'error');
            // reset form loading, keep fields editable
        } finally {
            setLoading(false);
        }
    }

    // Additional real-time check for placeholder credentials detection on page load
    function checkSupabasePlaceholders() {
        const isPlaceholderUrl = (SUPABASE_URL === "SUPABASE_URL");
        const isPlaceholderKey = (SUPABASE_ANON_KEY === "SUPABASE_ANON_KEY");
        if (isPlaceholderUrl || isPlaceholderKey) {
            // Show a non-intrusive note in console, but not alert on load to not distract
            console.warn("⚠️ Supabase credentials are using placeholder values. Replace SUPABASE_URL and SUPABASE_ANON_KEY for real authentication.");
            // optionally display gentle message inside alert area on page load only if user hasn't clicked
            // but we only show on login attempt, we add note in the info text? Maybe subtle:
            const infoDiv = document.querySelector('.info-text');
            if (infoDiv && !infoDiv.querySelector('.supabase-note')) {
                const note = document.createElement('div');
                note.className = 'supabase-note';
                note.style.fontSize = '0.7rem';
                note.style.marginTop = '0.5rem';
                note.style.color = '#9ca3af';
                note.innerText = '⚠️ Supabase keys are placeholders. Replace them for live auth.';
                infoDiv.appendChild(note);
            }
        } else {
            // try to init supabase early
            initSupabase();
        }
    }

    // Add event listeners and initialization
    function init() {
        // Attempt early supabase init if keys seem valid
        if (SUPABASE_URL !== "SUPABASE_URL" && SUPABASE_ANON_KEY !== "SUPABASE_ANON_KEY") {
            initSupabase();
        } else {
            // show a subtle reminder in console
            checkSupabasePlaceholders();
        }
        loginForm.addEventListener('submit', handleLogin);
        
        // optional: real-time inline clear of errors on input
        emailInput.addEventListener('input', () => {
            if (emailErrorSpan.innerText) emailErrorSpan.innerText = '';
            if (authAlertDiv.style.display === 'flex') hideAlert();
        });
        passwordInput.addEventListener('input', () => {
            if (passwordErrorSpan.innerText) passwordErrorSpan.innerText = '';
            if (authAlertDiv.style.display === 'flex') hideAlert();
        });
    }

    // Run after DOM fully loaded
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
