<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Editors Hub | Executive Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index-style.css" >
    <link rel="icon" type="image/png" href="misc/Small_Icon.png">
</head>
<body>
    <!-- Header with Navigation -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='about.html'">
                    <img style="width: 10%;" src="misc/Primary_Logo.png" >
                </div>
                
                <nav class="nav-links">
                    <a href="#" class="nav-link active">Dashboard</a>
                    <a href="#" class="nav-link">Templates</a>
                    <a href="#" class="nav-link">Documents</a>
                    <a href="#" class="nav-link">Settings</a>
                    <button onclick="logout()">Logout</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Dashboard Header -->
            <div class="dashboard-header">
                <img style="display:block ;height: 20%; width: 20%; margin: 0 auto;" src="misc/mainlogo.png" />
                <h1 class="dashboard-title">Executive Dashboard</h1>
                <p class="dashboard-subtitle"></p>
            </div>

            <!-- Tool Grid -->
            <div class="tools-grid">
                <!-- Announcement Editor -->

                <a href="templates/TaskAssignment.html" class="tool-card" style=" max-width: 250px;max-height: 300px;">
                    <div class="tool-icon">
                        <img src="misc/add.png" style="height: 30px">
                    </div>
                    <h3 class="tool-title">Seasonal Goals</h3>
                    <p class="tool-tagline">Current Season : 3</p>
                    <span class="tool-link">
                        Open <i class="fas fa-arrow-right"></i>
                    </span>
                </a>
            </div>

            <!-- Recent Documents Section -->
        
            
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-copyright">
                    © 2026 Asfoura - Miracle Doors Studio
                </div>
                <div class="footer-links">
                    <a href="#" class="footer-link">Help Center</a>
                    <a href="#" class="footer-link">Privacy</a>
                    <a href="#" class="footer-link">Terms</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        // Add interactive functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Tool card hover enhancement
            const toolCards = document.querySelectorAll('.tool-card');
            const recentItems = document.querySelectorAll('.recent-item');
            
            // Add click tracking for analytics (placeholder)
            toolCards.forEach(card => {
                card.addEventListener('click', function(e) {
                    console.log(`Navigating to ${this.getAttribute('href')}`);
                    // In a real application, you might track this event
                });
            });
            
            // Recent items click simulation
            recentItems.forEach(item => {
                item.addEventListener('click', function() {
                    const iconClass = this.querySelector('.recent-icon').className;
                    
                    // Determine which editor to open based on icon
                    if (iconClass.includes('icon-announcement')) {
                        window.location.href = 'announcement.html';
                    } else if (iconClass.includes('icon-task')) {
                        window.location.href = 'task.html';
                    } else if (iconClass.includes('icon-memo')) {
                        window.location.href = 'memo.html';
                    } else if (iconClass.includes('icon-policy')) {
                        window.location.href = 'policy.html';
                    }
                });
            });
            
            // Simulate loading animation for cards
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        });
        console.log("Supabase:", supabaseClient);
        document.addEventListener("DOMContentLoaded", async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                // Not logged in → send back to login
                window.location.href = "./index.html";
            } else {
                console.log("User is logged in:", user.email);
            }
        });

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "./index.html";
        }
    </script>
</body>
</html>
